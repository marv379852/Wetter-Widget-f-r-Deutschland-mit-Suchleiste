<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter Widget für Deutschland</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Wetter für Deutschland</h1>
        <div class="search-section">
            <input type="text" id="townSearch" placeholder="Stadt in Deutschland suchen (z.B. Berlin)">
            <button id="searchBtn">Suchen</button>
        </div>
        <div id="loading" class="loading hidden">Lädt Wetterdaten...</div>
        <div id="error" class="error hidden"></div>
        
        <!-- Current Weather -->
        <div id="currentWeather" class="weather-section hidden">
            <h2>Aktuelles Wetter</h2>
            <div id="currentStats"></div>
        </div>
        
        <!-- Daily Forecast -->
        <div id="dailyForecast" class="weather-section hidden">
            <h2>Tagesprognose</h2>
            <div id="dailyStats"></div>
        </div>
        
        <!-- Hourly Forecast -->
        <div id="hourlyForecast" class="weather-section hidden">
            <h2>Stundenprognose</h2>
            <div id="hourlyStats"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
